name: Stale render preview cleanup

# Sweeps open PRs that carry the `render-preview` label but haven't seen a new
# commit in STALE_DAYS days. For each stale PR:
#   1. Remove the `render-preview` label (which draft-toggle.yml will then also
#      mark as ready-for-review as a side effect — fine, that's symmetric).
#   2. Look up the matching Render service ("venture-impact-platform PR #<N>")
#      and DELETE it via the Render API so we stop paying for an idle preview.
#   3. Leave a short comment on the PR explaining what was removed and how to
#      get a fresh preview back.
#
# Runs every 2 days. Manual runs via workflow_dispatch support a dry-run mode
# and overriding the staleness threshold, so you can audit before acting.
#
# Secrets required:
#   - RENDER_API_KEY : optional. If absent, the label is still removed but the
#     Render service deletion step is skipped (logged + noted in PR comment).
#   - AUTO_MERGE_PAT : optional. Falls back to GITHUB_TOKEN. Used so that label
#     changes trigger the existing draft-toggle workflow.

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, no changes)"
        type: boolean
        default: false
      stale_days:
        description: "Days of inactivity to consider stale"
        type: string
        default: "3"

permissions:
  contents: read
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      STALE_DAYS: ${{ github.event.inputs.stale_days || '3' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - name: Find and clean up stale render-preview PRs
        run: |
          set -eu

          now_epoch=$(date -u +%s)
          threshold_epoch=$(date -u -d "${STALE_DAYS} days ago" +%s)
          echo "Now:              $(date -u -Iseconds)"
          echo "Stale threshold:  ${STALE_DAYS} days ago ($(date -u -d "${STALE_DAYS} days ago" -Iseconds))"
          echo "Dry run:          ${DRY_RUN}"

          mapfile -t pr_numbers < <(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --label render-preview \
            --state open \
            --json number \
            --jq '.[].number')

          if [ ${#pr_numbers[@]} -eq 0 ]; then
            echo ""
            echo "No open PRs carry the render-preview label. Nothing to do."
            exit 0
          fi

          echo ""
          echo "Open PRs with render-preview label: ${pr_numbers[*]}"

          stale_count=0
          fresh_count=0

          for pr in "${pr_numbers[@]}"; do
            echo ""
            echo "=== PR #${pr} ==="

            pr_json=$(gh pr view "$pr" \
              --repo "${GITHUB_REPOSITORY}" \
              --json title,author,commits)
            title=$(echo "$pr_json" | jq -r '.title')
            author=$(echo "$pr_json" | jq -r '.author.login')
            last_commit_date=$(echo "$pr_json" \
              | jq -r '[.commits[].committedDate] | sort | last // empty')

            echo "  title:  ${title}"
            echo "  author: @${author}"

            if [ -z "$last_commit_date" ]; then
              echo "  no commit date returned; skipping"
              continue
            fi

            last_commit_epoch=$(date -u -d "$last_commit_date" +%s)
            age_days=$(( (now_epoch - last_commit_epoch) / 86400 ))
            echo "  last commit: ${last_commit_date} (${age_days}d ago)"

            if [ "$last_commit_epoch" -ge "$threshold_epoch" ]; then
              echo "  -> fresh, keeping label and preview"
              fresh_count=$((fresh_count + 1))
              continue
            fi

            echo "  -> STALE (>= ${STALE_DAYS} days); cleaning up"
            stale_count=$((stale_count + 1))

            if [ "$DRY_RUN" = "true" ]; then
              echo "  [dry run] would remove render-preview label and delete Render service"
              continue
            fi

            gh pr edit "$pr" \
              --repo "${GITHUB_REPOSITORY}" \
              --remove-label render-preview
            echo "  removed render-preview label"

            comment_body="Auto-removed the \`render-preview\` label — no new commits for ${age_days} days. Re-apply the label when you resume work to get a fresh preview."

            if [ -n "${RENDER_API_KEY:-}" ]; then
              service_name="venture-impact-platform PR #${pr}"
              service_id=$(curl -s \
                -H "Authorization: Bearer ${RENDER_API_KEY}" \
                "https://api.render.com/v1/services?limit=100" \
                | jq -r --arg n "$service_name" \
                    '.[] | select(.service.name == $n) | .service.id' \
                | head -n1)

              if [ -z "$service_id" ] || [ "$service_id" = "null" ]; then
                echo "  no Render service matching '${service_name}' (already deleted?)"
                comment_body="${comment_body} (No matching Render service found — looks already deleted.)"
              else
                http_code=$(curl -s -o /tmp/render_delete.out -w '%{http_code}' \
                  -X DELETE \
                  -H "Authorization: Bearer ${RENDER_API_KEY}" \
                  "https://api.render.com/v1/services/${service_id}")
                echo "  Render DELETE ${service_id} -> ${http_code}"
                if [ "${http_code:0:1}" = "2" ]; then
                  comment_body="${comment_body} Render preview service \`${service_id}\` was deleted."
                else
                  echo "    body: $(cat /tmp/render_delete.out)"
                  comment_body="${comment_body} (Failed to delete Render service \`${service_id}\`, HTTP ${http_code}. Check it manually.)"
                fi
              fi
            else
              echo "  RENDER_API_KEY not configured; skipping Render cleanup"
              comment_body="${comment_body} (Note: RENDER_API_KEY secret not configured, so the Render preview service was not deleted automatically.)"
            fi

            gh pr comment "$pr" \
              --repo "${GITHUB_REPOSITORY}" \
              --body "$comment_body"
          done

          echo ""
          echo "Summary: ${fresh_count} fresh, ${stale_count} stale"
