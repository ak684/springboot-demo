name: Auto-merge for trusted users

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

jobs:
  auto-merge-on-success:
    name: Auto-merge PR after CI success
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: Get PR number from workflow run
        id: pr-number
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the PR number from the workflow run
          PR_NUMBER=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }} \
            --jq '.pull_requests[0].number // empty')
          
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this workflow run"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check PR labels and author
        if: steps.pr-number.outputs.skip != 'true'
        id: check-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ steps.pr-number.outputs.pr_number }}
          
          # Get PR details
          PR_DATA=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/pulls/${PR_NUMBER})
          
          # Check if PR has auto-merge label
          HAS_LABEL=$(echo "$PR_DATA" | jq -r '.labels[] | select(.name == "auto-merge") | .name // empty')
          
          # Get PR author
          PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.user.login')
          
          # Check if PR is from aking13 or has approval from aking13
          if [ "$HAS_LABEL" = "auto-merge" ]; then
            if [ "$PR_AUTHOR" = "aking13" ]; then
              echo "should_merge=true" >> $GITHUB_OUTPUT
              echo "PR #${PR_NUMBER} from aking13 has auto-merge label"
            else
              # Check for approval from aking13
              APPROVED_BY_AKING13=$(gh api \
                -H "Accept: application/vnd.github+json" \
                /repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews \
                --jq '.[] | select(.user.login == "aking13" and .state == "APPROVED") | .user.login // empty' \
                | head -n1)
              
              if [ "$APPROVED_BY_AKING13" = "aking13" ]; then
                echo "should_merge=true" >> $GITHUB_OUTPUT
                echo "PR #${PR_NUMBER} approved by aking13 has auto-merge label"
              else
                echo "should_merge=false" >> $GITHUB_OUTPUT
                echo "PR #${PR_NUMBER} has auto-merge label but is not from/approved by aking13"
              fi
            fi
          else
            echo "should_merge=false" >> $GITHUB_OUTPUT
            echo "PR #${PR_NUMBER} does not have auto-merge label"
          fi

      - name: Merge PR
        if: |
          steps.pr-number.outputs.skip != 'true' &&
          steps.check-pr.outputs.should_merge == 'true'
        env:
          # Use PAT to trigger deploy workflow after merge
          # If PAT is not available, fall back to GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ steps.pr-number.outputs.pr_number }}
          echo "Merging PR #${PR_NUMBER}"
          
          # Get PR title and body for commit message
          PR_DATA=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/pulls/${PR_NUMBER})
          
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
          PR_BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
          
          # Create commit message with PR title and description
          if [ -n "$PR_BODY" ]; then
            COMMIT_MSG=$(printf "%s\n\n%s" "${PR_TITLE}" "${PR_BODY}")
          else
            COMMIT_MSG="${PR_TITLE}"
          fi
          
          # Merge with custom commit message
          gh pr merge ${PR_NUMBER} --squash --subject "${PR_TITLE}" --body "${PR_BODY}" --repo ${{ github.repository }}

  notify-non-trusted:
    name: Notify non-trusted user
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'auto-merge' &&
      github.event.pull_request.user.login != 'aking13'
    
    steps:
      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '👋 The `auto-merge` label has been added, but auto-merge is only available for PRs created or approved by trusted users (aking13). A trusted user can approve this PR to enable auto-merge.'
            })