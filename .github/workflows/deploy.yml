name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-on-github:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # For private repos

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/admin-app/package-lock.json'

      - name: Build application (ON GITHUB!)
        run: |
          echo "🔨 Building on GitHub Actions runner..."
          echo "Build started at $(date)"
          mvn clean package -DskipTests -T 1C
          echo "Build completed at $(date)"
          ls -lh target/

      - name: Copy JAR to Droplet
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT }}
          source: "target/ventureplatform-1.0.jar"
          target: "/tmp"
          strip_components: 1  # Removes the 'target/' directory prefix

      - name: Deploy JAR on Droplet (NO BUILD!)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT }}
          command_timeout: 5m  # Only needs 5 minutes since NO BUILD
          script: |
            echo "📦 Deploying pre-built JAR..."

            # Backup current JAR
            if [ -f /impactforesight/ventureplatform-1.0.jar ]; then
              cp /impactforesight/ventureplatform-1.0.jar /impactforesight/ventureplatform-1.0.jar.backup
            fi

            # Stop service
            echo "Stopping service..."
            sudo systemctl stop impactforesight

            # Deploy new JAR
            echo "Installing new JAR..."
            sudo mv /tmp/ventureplatform-1.0.jar /impactforesight/ventureplatform-1.0.jar

            # Start service
            echo "Starting service..."
            sudo systemctl start impactforesight

            # Wait and verify
            sleep 30

            if sudo systemctl is-active --quiet impactforesight; then
              echo "✅ Deployment successful!"

              # Optional health check
              if curl -f -s -o /dev/null http://localhost:9000/actuator/health; then
                echo "✅ Health check passed!"
              fi
            else
              echo "❌ Service failed to start - rolling back"
              if [ -f /impactforesight/ventureplatform-1.0.jar.backup ]; then
                sudo mv /impactforesight/ventureplatform-1.0.jar.backup /impactforesight/ventureplatform-1.0.jar
                sudo systemctl start impactforesight
              fi
              exit 1
            fi
