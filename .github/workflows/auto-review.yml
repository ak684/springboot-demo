name: auto-review (loop step 1/3)
# Fires when the `auto` label is added to a PR. Posts the trigger comment
# that invokes the OpenHands /autoreview skill. The comment is posted using
# OPENHANDS_TRIGGER_PAT (a Personal Access Token belonging to a real user
# with an OpenHands account) so the OHE resolver can map the commenter to
# a Keycloak identity. The default github-actions[bot] cannot do this.

on:
  # Use pull_request_target so the workflow file from the BASE branch (main)
  # is used. Otherwise PRs opened from older branches still see the old
  # workflow (no PAT, includes "please" in body, etc.). Safe here because
  # the workflow doesn't check out PR content — it only posts a comment.
  pull_request_target:
    types: [labeled]

jobs:
  trigger-review:
    if: github.event.label.name == 'auto'
    runs-on: ubuntu-latest
    steps:
      - name: Post @openhands /autoreview trigger comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.OPENHANDS_TRIGGER_PAT }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '@openhands /autoreview',
            });
