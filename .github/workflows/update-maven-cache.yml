name: Update Maven Cache

on:
  pull_request:
    paths:
      - 'pom.xml'

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Regenerate Maven cache
        run: |
          chmod +x scripts/generate-maven-cache.sh
          ./scripts/generate-maven-cache.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet .m2-cache/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated cache
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .m2-cache/
          git commit -m "Update Maven cache for pom.xml changes"
          git push
