name: Auto-toggle PR draft status

on:
  pull_request:
    types: [labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  convert-to-draft:
    name: Convert to draft when render-preview added
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'labeled' &&
      github.event.label.name == 'render-preview' &&
      github.event.pull_request.draft == false
    steps:
      - name: Convert PR to draft
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NODE_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            --jq '.node_id')

          gh api graphql -f query='
            mutation($id: ID!) {
              convertPullRequestToDraft(input: {pullRequestId: $id}) {
                pullRequest {
                  isDraft
                }
              }
            }
          ' -f id="$PR_NODE_ID"

          echo "✅ PR #${{ github.event.pull_request.number }} converted to draft"

  mark-ready-on-preview-removed:
    name: Mark ready when render-preview removed
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'unlabeled' &&
      github.event.label.name == 'render-preview' &&
      github.event.pull_request.draft == true
    steps:
      - name: Mark PR ready for review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr ready ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
          echo "✅ PR #${{ github.event.pull_request.number }} marked ready for review"

  mark-ready-on-auto-merge:
    name: Mark ready when auto-merge added
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'labeled' &&
      github.event.label.name == 'auto-merge' &&
      github.event.pull_request.draft == true
    steps:
      - name: Mark PR ready for review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr ready ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
          echo "✅ PR #${{ github.event.pull_request.number }} marked ready for review"
