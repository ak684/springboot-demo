    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const selectedBrand = params.get('brand');
        const isProd = ['app.impactforesight.io', 'wista.impactforesight.io']
          .includes(window.location.hostname);

        // In prod, use sessionStorage (clears on tab close). In non-prod, use localStorage.
        const storage = isProd ? sessionStorage : localStorage;

        if (selectedBrand !== null) {
          if (selectedBrand && selectedBrand !== 'default') {
            storage.setItem('selectedBrand', selectedBrand);
          } else {
            storage.removeItem('selectedBrand');
          }
        }

        const brand = storage.getItem('selectedBrand');
        const brandingSrc = brand && brand !== 'default'
          ? `/branding.js?brand=${encodeURIComponent(brand)}`
          : '/branding.js';
        document.write(
          `<script id="branding-script" src="${brandingSrc}"><\/script>`
        );
      })();
    </script>
