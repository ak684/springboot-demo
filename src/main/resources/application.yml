# Deployment info - accessible via /actuator/info
info:
  app:
    name: Venture Impact Platform
    version: '@project.version@'
    commit: '${git.commit.id.abbrev:unknown}'
    branch: '${git.branch:unknown}'
    build-time: '${git.build.time:unknown}'

# Enable actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    git:
      mode: full

server:
  port: ${SERVER_PORT:9000}
  compression:
    enabled: true
    mime-types: text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 4096
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-alias: ${SERVER_SSL_KEY_ALIAS:}

token:
  secret: 9w3qmMvFn*46
  expiration:
    short: 2592000 # 1 month, value in seconds
    long: 31540000 # 1 year, value in seconds

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  security:
    filter:
      order: 10 # Add padding to filters so that we can insert ours before the default ones
    superadmin:
      emails:
        - ingo.michelfelder@web.de
        - alona@impactforesight.io
        - ingo@impactforesight.io
        - praew@impactforesight.io
        - vivian@impactforesight.io
      notification-email: ingo@impactforesight.io
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: none
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/ventureplatform_dev?currentSchema=public
    username: impact_user
    password: ${db.password}

  liquibase:
    change-log: classpath:db/db.changelog.yml
    enabled: true
    default-schema: public

  mvc:
    pathmatch:
      # toDO: Check how we can use the newer PathPattern in FrontEndController.java
      matching-strategy: ant_path_matcher
  jackson:
    mapper:
      default-view-inclusion: true
  mail:
    host: smtp.office365.com
    port: 587
    username: ingo@impactforesight.io
    password: Boston2022IM*
    properties:
      mail:
        smtp:
          auth: true
          timeout: 60000
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

