databaseChangeLog:
  - changeSet:
      id: 2025_07_02_add_company_extraction_data_table
      author: alona
      changes:
        - createTable:
            tableName: company_extraction_data
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: company_url
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: domain
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: company_name
                  type: varchar(255)
              - column:
                  name: company_description
                  type: text
              - column:
                  name: industry_sectors
                  type: varchar(500)
              - column:
                  name: number_of_employees
                  type: varchar(100)
              - column:
                  name: founding_year
                  type: varchar(50)
              - column:
                  name: headquarters_location
                  type: varchar(255)
              - column:
                  name: website
                  type: varchar(500)
              - column:
                  name: annual_sales
                  type: varchar(100)
              - column:
                  name: number_of_patents
                  type: varchar(50)
              - column:
                  name: patent_search_url
                  type: varchar(1000)
              - column:
                  name: esg_rating
                  type: varchar(50)
              - column:
                  name: esg_score
                  type: varchar(50)
              - column:
                  name: sustainability_orientation
                  type: varchar(255)
              - column:
                  name: sustainability_impact_area
                  type: varchar(255)
              - column:
                  name: sustainability_score
                  type: varchar(50)
              - column:
                  name: theory_of_change
                  type: text
              - column:
                  name: problem_description
                  type: text
              - column:
                  name: innovation_description
                  type: text
              - column:
                  name: sdgs
                  type: varchar(500)
              - column:
                  name: target_stakeholders
                  type: varchar(500)
              - column:
                  name: geography_of_impact
                  type: varchar(500)
              - column:
                  name: cluster_assignment
                  type: varchar(255)
              - column:
                  name: cluster_justification
                  type: text
              - column:
                  name: social_media_links
                  type: jsonb
              - column:
                  name: social_media_follower_counts
                  type: jsonb
              - column:
                  name: confidence_scores
                  type: jsonb
              - column:
                  name: raw_extraction_data
                  type: jsonb
              - column:
                  name: extraction_phases_completed
                  type: jsonb
              - column:
                  name: venture_id
                  type: bigint
                  constraints:
                    nullable: true
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: last_modified_by
                  type: bigint
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_modified_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseColumnNames: venture_id
            baseTableName: company_extraction_data
            constraintName: fk_company_extraction_venture
            referencedColumnNames: id
            referencedTableName: ventures
            onDelete: SET NULL
        - createIndex:
            tableName: company_extraction_data
            indexName: idx_company_extraction_url
            columns:
              - column:
                  name: company_url
        - createIndex:
            tableName: company_extraction_data
            indexName: idx_company_extraction_created_by
            columns:
              - column:
                  name: created_by
        - createIndex:
            tableName: company_extraction_data
            indexName: idx_company_extraction_domain
            columns:
              - column:
                  name: domain
