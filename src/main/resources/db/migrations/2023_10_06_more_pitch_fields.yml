- changeSet:
    id: update-impacts-pitchOrder
    author: andrewkoziulia
    changes:
    - sql:
        sql: |
          WITH numbered_impacts AS (
            SELECT
              id,
              row_number() OVER (PARTITION BY venture_id ORDER BY created_at) - 1 AS new_pitch_order
            FROM impacts
          )
          UPDATE impacts
          SET pitch_order = numbered_impacts.new_pitch_order
          FROM numbered_impacts
          WHERE impacts.id = numbered_impacts.id;
- changeSet:
    id: update-impact-indicators-pitchOrder
    author: andrewkoziulia
    changes:
    - sql:
        sql: |
          WITH numbered_indicators AS (
            SELECT
              id,
              row_number() OVER (PARTITION BY impact_id ORDER BY id) - 1 AS new_pitch_order
            FROM impact_indicators
          )
          UPDATE impact_indicators
          SET pitch_order = numbered_indicators.new_pitch_order
          FROM numbered_indicators
          WHERE impact_indicators.id = numbered_indicators.id;
