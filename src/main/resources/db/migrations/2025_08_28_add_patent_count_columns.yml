databaseChangeLog:
  - changeSet:
      id: 2025_08_28_add_patent_count_columns
      author: alona
      comment: "Add patent count columns to company_extraction_data table"
      changes:
        - addColumn:
            tableName: company_extraction_data
            columns:
              - column:
                  name: total_patents
                  type: INTEGER
              - column:
                  name: granted_patents
                  type: INTEGER
              - column:
                  name: patent_applications
                  type: INTEGER