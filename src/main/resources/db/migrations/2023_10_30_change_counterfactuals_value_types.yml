        tableName: impact_indicators
        columnName: displacement
        newDataType: double precision
    - modifyDataType:
        tableName: impact_indicators
        columnName: attribution
        newDataType: double precision
    - modifyDataType:
        tableName: impact_indicator_dropoff
        columnName: dropoff
