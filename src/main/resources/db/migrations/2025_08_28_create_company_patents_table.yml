databaseChangeLog:
  - changeSet:
      id: 2025_08_28_create_company_patents_table
      author: alona
      comment: "Create table to store scraped patent data for companies"
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: company_patents
      changes:
        - createTable:
            tableName: company_patents
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: company_extraction_data_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: patent_number
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: TEXT
              - column:
                  name: inventor
                  type: TEXT
              - column:
                  name: assignee
                  type: TEXT
              - column:
                  name: publication_date
                  type: VARCHAR(50)
              - column:
                  name: filed_date
                  type: VARCHAR(50)
              - column:
                  name: priority_date
                  type: VARCHAR(50)
              - column:
                  name: abstract_text
                  type: TEXT
              - column:
                  name: patent_url
                  type: VARCHAR(1000)
              - column:
                  name: pdf_url
                  type: VARCHAR(1000)
              - column:
                  name: is_granted
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: patent_jurisdictions
                  type: VARCHAR(500)
                  remarks: "JSON array of jurisdiction objects with code and status"
              - column:
                  name: scraped_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
              - column:
                  name: last_modified_by
                  type: BIGINT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_modified_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: company_patents
            baseColumnNames: company_extraction_data_id
            referencedTableName: company_extraction_data
            referencedColumnNames: id
            constraintName: fk_company_patents_extraction_data
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: company_patents
            columnNames: company_extraction_data_id, patent_number
            constraintName: unique_company_patent
        - createIndex:
            tableName: company_patents
            indexName: idx_company_patents_company_id
            columns:
              - column:
                  name: company_extraction_data_id
        - createIndex:
            tableName: company_patents
            indexName: idx_company_patents_patent_number
            columns:
              - column:
                  name: patent_number
        - createIndex:
            tableName: company_patents
            indexName: idx_company_patents_is_granted
            columns:
              - column:
                  name: is_granted
        - createIndex:
            tableName: company_patents
            indexName: idx_company_patents_scraped_at
            columns:
              - column:
                  name: scraped_at