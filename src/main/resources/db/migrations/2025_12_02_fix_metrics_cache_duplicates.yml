databaseChangeLog:
  - changeSet:
      id: 2025_12_02_fix_metrics_cache_duplicates
      author: claude
      comment: "Fix duplicate metrics cache entries for global view (NULL portfolio_id)"
      changes:
        # First, delete duplicate rows keeping only the most recent one (highest id)
        - sql:
            sql: |
              DELETE FROM company_data_extraction_metrics a
              USING company_data_extraction_metrics b
              WHERE a.metric_key = b.metric_key
                AND a.portfolio_id IS NULL
                AND b.portfolio_id IS NULL
                AND a.id < b.id

        # Add a partial unique index to prevent future duplicates where portfolio_id IS NULL
        # Standard unique constraints don't work with NULL values in PostgreSQL
        - sql:
            sql: |
              CREATE UNIQUE INDEX IF NOT EXISTS idx_metrics_unique_key_null_portfolio
              ON company_data_extraction_metrics(metric_key)
              WHERE portfolio_id IS NULL
