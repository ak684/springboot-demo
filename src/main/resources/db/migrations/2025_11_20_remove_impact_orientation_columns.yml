        - dropColumn:
            columnName: sustainability_operational_score
            tableName: company_extraction_data
        - dropColumn:
            columnName: sustainability_problem_addressed_justification
            tableName: company_extraction_data
        - dropColumn:
            columnName: sustainability_sdg_alignment_justification
            tableName: company_extraction_data
        - dropColumn:
            columnName: sustainability_operational_justification
            tableName: company_extraction_data
